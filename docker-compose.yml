services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: xiaguo
      POSTGRES_USER: xiaguo
      POSTGRES_PASSWORD: xiaguo
    ports:
      - "5432:5432"
    volumes:
      - xiaguo_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://xiaguo:xiaguo@db:5432/xiaguo
      HOST: 0.0.0.0
      PORT: 8787
    ports:
      - "8787:8787"
    depends_on:
      - db

volumes:
  xiaguo_pgdata:

